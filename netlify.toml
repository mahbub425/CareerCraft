[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_APPWRITE_CVS_COLLECTION_ID,VITE_APPWRITE_TEMPLATES_COLLECTION_ID,VITE_APPWRITE_CATEGORIES_COLLECTION_ID,VITE_APPWRITE_DOWNLOADS_COLLECTION_ID"

[[redirects]]
  from = "/api/email/payment-status"
  to = "/.netlify/functions/email-payment-status"
  status = 200
